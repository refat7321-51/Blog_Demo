{% extends 'blog/base.html' %}
{% block title %}Delete Post — MyBlog{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <i class="fas fa-exclamation-triangle fa-4x text-danger"></i>
                    </div>
                    <h4 class="fw-bold mb-3">Delete Post?</h4>
                    <p class="text-muted mb-4">
                        Are you sure you want to delete
                        <strong class="text-dark">"{{ post.title }}"</strong>?
                        <br>
                        <span class="text-danger small">This action cannot be undone.</span>
                    </p>
                    <form method="post" class="d-flex gap-3 justify-content-center">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="fas fa-trash-alt me-2"></i>Yes, Delete
                        </button>
                        <a href="/post/{{ post.pk }}/" class="btn btn-outline-secondary px-4">
                            <i class="fas fa-times me-2"></i>Cancel
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
