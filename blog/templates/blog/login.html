{% extends 'blog/base.html' %}
{% block title %}Login — MyBlog{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div style="width:60px; height:60px; background:linear-gradient(135deg,#667eea,#764ba2); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 12px;">
                            <i class="fas fa-lock" style="color:white; font-size:1.3rem;"></i>
                        </div>
                        <h4 class="fw-bold">Welcome Back!</h4>
                        <p class="text-muted small">Login to your account</p>
                    </div>

                    <form method="post" novalidate>
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">
                                <i class="fas fa-user me-1 text-muted"></i>Username
                            </label>
                            <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold small">
                                <i class="fas fa-key me-1 text-muted"></i>Password
                            </label>
                            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                        </div>
                        {% if form.errors %}
                        <div class="alert alert-danger py-2 small">
                            <i class="fas fa-exclamation-circle me-1"></i>
                            Invalid username or password. Please try again.
                        </div>
                        {% endif %}
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>
                    </form>

                    <p class="text-center mt-4 mb-0 text-muted small">
                        Don't have an account?
                        <a href="/register/" class="fw-semibold text-decoration-none" style="color:#667eea;">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
